<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Kitchen Appliances</title>
    <link rel="stylesheet" href="styles.css"> <!-- Optional CSS -->
</head>
<body>
    <h1>Connected Kitchen Appliances</h1>
    
    <h2>Coffee Maker</h2>
    <button onclick="startCoffeeMaker(5)">Start (5 min)</button>
    <button onclick="stopCoffeeMaker()">Stop</button>
    
    <h2>Rice Cooker</h2>
    <button onclick="startRiceCooker()">Start</button>
    <button onclick="stopRiceCooker()">Stop</button>
    
    <h2>Microwave</h2>
    <button onclick="startMicrowave(2)">Start (2 min)</button>
    <button onclick="stopMicrowave()">Stop</button>
    
    <h2>Mixer</h2>
    <button onclick="startMixer()">Start</button>
    <button onclick="stopMixer()">Stop</button>
    
    <script src="script.js"></script> <!-- Your JavaScript -->
</body>
</html>
